name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # All actions pinned to immutable commit SHAs (supply-chain hardening).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Restore signing keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          mkdir -p keystore
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > keystore/passlock-release.jks
          {
            printf 'storeFile=keystore/passlock-release.jks\n'
            printf 'storePassword=%s\n' "$STORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
          } > keystore.properties

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Stage APK artifact
        env:
          TAG: ${{ github.ref_name }}
        run: cp app/build/outputs/apk/release/app-release.apk "passlock-${TAG}.apk"

      # Wipe the signing key BEFORE any third-party action runs, so it is never
      # on disk while untrusted code executes.
      - name: Wipe signing material
        if: always()
        run: rm -f keystore/passlock-release.jks keystore.properties

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: passlock-*.apk
          generate_release_notes: true
