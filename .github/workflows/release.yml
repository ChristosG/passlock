name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore signing keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          mkdir -p keystore
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > keystore/passlock-release.jks
          {
            printf 'storeFile=keystore/passlock-release.jks\n'
            printf 'storePassword=%s\n' "$STORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
          } > keystore.properties

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Stage APK artifact
        env:
          TAG: ${{ github.ref_name }}
        run: cp app/build/outputs/apk/release/app-release.apk "passlock-${TAG}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: passlock-*.apk
          generate_release_notes: true

      - name: Clean up signing material
        if: always()
        run: rm -f keystore/passlock-release.jks keystore.properties
